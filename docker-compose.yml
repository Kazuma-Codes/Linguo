version : '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER : ${POSTGRES_USER:-user} 
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB : ${POSTGRES_DB:-translate_app}

    ports:
      - "5432:5432"

        
    volumes :
      - postgres_data:/var/lib/postgresql/data 

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  
  minio:
    image: minio/minio 
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD : ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - minio
  
volumes:
  postgres_data:
  redis_data:
  minio_data: